<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correção de Inglês - EdyMichaelCover</title>

<style>
body{
  margin:0;
  padding:15px;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#000,#111);
  color:white;
}

header{
  text-align:center;
  border:2px solid gold;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  background:#050505;
}

h1,h2{
  color:gold;
}

.card{
  background:#111;
  border:1px solid gold;
  border-radius:15px;
  padding:15px;
  margin-bottom:20px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid gold;
  background:#000;
  color:white;
  font-size:16px;
}

button{
  width:100%;
  padding:13px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:gold;
  color:black;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th{
  background:gold;
  color:black;
  padding:10px;
}

td{
  border:1px solid #555;
  padding:8px;
  text-align:center;
}

.acerto{
  color:#00ff66;
  font-weight:bold;
}

.erro{
  color:#ff4444;
  font-weight:bold;
}

.total{
  font-size:25px;
  color:#00ff66;
  font-weight:bold;
  text-align:center;
}

@media print{
  button{display:none;}
  body{background:white;color:black;}
  .card,header{border:1px solid black;}
}
</style>
</head>

<body>

<header>
  <h1>🇺🇸 Correção de Inglês</h1>
  <p>Frases • Palavras • Acertos • Erros • Pontuação</p>
</header>

<div class="card">
  <h2>➕ Adicionar Frase ou Palavra</h2>

  <label>Frase ou palavra em inglês</label>
  <textarea id="frase" rows="2" placeholder="Ex: I am ready for the show"></textarea>

  <label>Tradução / significado</label>
  <input id="traducao" placeholder="Ex: Eu estou pronto para o show">

  <label>Status</label>
  <select id="status">
    <option value="acerto">✅ Acerto</option>
    <option value="erro">❌ Erro</option>
  </select>

  <label>Observação do erro ou correção</label>
  <input id="obs" placeholder="Ex: Erro de pronúncia, verbo, palavra esquecida...">

  <button onclick="adicionar()">Adicionar na Tabela</button>
</div>

<div class="card">
  <h2>📊 Tabela Editável de Avaliação</h2>

  <table>
    <thead>
      <tr>
        <th>Frase / Palavra</th>
        <th>Tradução</th>
        <th>Status</th>
        <th>Observação</th>
        <th>Pontos</th>
        <th>Ação</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>

  <div class="total" id="resultado">Pontuação: 0</div>

  <button onclick="salvar()">💾 Salvar Histórico</button>
  <button onclick="window.print()">📄 Salvar em PDF</button>
  <button onclick="limpar()">🗑️ Limpar Tudo</button>
</div>

<script>
let dados = JSON.parse(localStorage.getItem("inglesEdy")) || [];

function adicionar(){
  const frase = document.getElementById("frase").value;
  const traducao = document.getElementById("traducao").value;
  const status = document.getElementById("status").value;
  const obs = document.getElementById("obs").value;

  if(frase.trim() === ""){
    alert("Digite uma frase ou palavra em inglês.");
    return;
  }

  dados.push({
    frase,
    traducao,
    status,
    obs
  });

  salvar();
  mostrar();

  document.getElementById("frase").value = "";
  document.getElementById("traducao").value = "";
  document.getElementById("obs").value = "";
}

function mostrar(){
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  let pontos = 0;

  dados.forEach((item,index)=>{
    let ponto = item.status === "acerto" ? 10 : -5;
    pontos += ponto;

    tabela.innerHTML += `
      <tr>
        <td contenteditable="true" oninput="editar(${index},'frase',this.innerText)">${item.frase}</td>
        <td contenteditable="true" oninput="editar(${index},'traducao',this.innerText)">${item.traducao}</td>
        <td>
          <select onchange="editar(${index},'status',this.value)">
            <option value="acerto" ${item.status==="acerto"?"selected":""}>✅ Acerto</option>
            <option value="erro" ${item.status==="erro"?"selected":""}>❌ Erro</option>
          </select>
        </td>
        <td contenteditable="true" oninput="editar(${index},'obs',this.innerText)">${item.obs}</td>
        <td class="${item.status}">
          ${item.status === "acerto" ? "+10 ✅" : "-5 ❌"}
        </td>
        <td>
          <button onclick="apagar(${index})">Apagar</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("resultado").innerText =
    "Pontuação: " + pontos + " pontos";
}

function editar(index,campo,valor){
  dados[index][campo] = valor;
  salvar();
  mostrar();
}

function apagar(index){
  dados.splice(index,1);
  salvar();
  mostrar();
}

function salvar(){
  localStorage.setItem("inglesEdy", JSON.stringify(dados));
}

function limpar(){
  if(confirm("Deseja apagar tudo?")){
    dados = [];
    salvar();
    mostrar();
  }
}

mostrar();
</script>

</body>
</html>
