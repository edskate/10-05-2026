<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradutor e Correção Inglês - EdyMichaelCover</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:15px;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#000,#111);
  color:white;
}

header{
  text-align:center;
  padding:20px;
  border:2px solid gold;
  border-radius:20px;
  background:#050505;
  margin-bottom:20px;
}

header h1{
  color:gold;
  margin:0;
}

.card{
  background:#111;
  border:1px solid gold;
  border-radius:15px;
  padding:15px;
  margin-bottom:20px;
}

h2{
  color:gold;
}

label{
  display:block;
  margin-top:10px;
  color:#ffd700;
}

input,
textarea,
select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid gold;
  background:#000;
  color:white;
  margin-top:5px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  font-size:16px;
}

button:hover{
  background:#ffe680;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th{
  background:gold;
  color:black;
  padding:10px;
}

td{
  border:1px solid #555;
  padding:8px;
  text-align:center;
}

td[contenteditable]{
  background:#000;
  color:white;
}

.acerto{
  color:#00ff66;
  font-weight:bold;
}

.erro{
  color:#ff4444;
  font-weight:bold;
}

.total{
  text-align:center;
  font-size:26px;
  color:#00ff66;
  font-weight:bold;
  margin-top:15px;
}

.historico-item{
  background:#000;
  border:1px solid #444;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
}

@media print{

button{
  display:none;
}

body{
  background:white;
  color:black;
}

.card,
header{
  border:1px solid black;
}

td[contenteditable]{
  color:black;
  background:white;
}

}

</style>
</head>

<body>

<header>
  <h1>🇧🇷 ➜ 🇺🇸 Tradutor e Correção Inglês</h1>
  <p>Tradução • Correção • Pontuação • Histórico • PDF</p>
</header>

<div class="card">

<h2>➕ Nova Tradução</h2>

<label>🇧🇷 Frase em Português</label>
<textarea id="portugues" rows="3"
placeholder="Ex: Eu estou pronto para o show"></textarea>

<button onclick="traduzir()">
🌍 Traduzir para Inglês
</button>

<label>🇺🇸 Tentativa em Inglês</label>
<textarea id="tentativa" rows="2"
placeholder="Digite sua tentativa"></textarea>

<label>✅ Inglês Correto</label>
<textarea id="correcao" rows="2"></textarea>

<label>🗣️ Pronúncia Aproximada</label>
<input id="pronuncia"
placeholder="Ex: Ai ém ré-di fór dê shôu">

<label>📌 Observação</label>
<textarea id="obs" rows="2"></textarea>

<label>Status</label>
<select id="status">
  <option value="acerto">✅ Acerto</option>
  <option value="erro">❌ Erro</option>
</select>

<button onclick="adicionar()">
➕ Salvar na Tabela
</button>

</div>

<div class="card">

<h2>📊 Tabela de Correção</h2>

<table>

<thead>
<tr>
<th>Português</th>
<th>Tentativa</th>
<th>Correto</th>
<th>Pronúncia</th>
<th>Status</th>
<th>Observação</th>
<th>Pontos</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

<div class="total" id="pontuacao">
Pontuação: 0
</div>

<button onclick="window.print()">
📄 Salvar PDF
</button>

<button onclick="limparTudo()">
🗑️ Limpar Tudo
</button>

</div>

<div class="card">

<h2>🗂️ Histórico Salvo</h2>

<div id="historico"></div>

</div>

<script>

let dados =
JSON.parse(localStorage.getItem("inglesEdy")) || [];

const dicionario = {

"eu estou pronto para o show":
"I am ready for the show",

"eu tenho ensaio hoje":
"I have rehearsal today",

"eu vou dançar agora":
"I will dance now",

"o show começa às nove":
"The show starts at nine",

"preciso melhorar minha pronúncia":
"I need to improve my pronunciation",

"estou chegando":
"I am arriving",

"vamos ensaiar":
"Let's rehearse",

"a música começa agora":
"The music starts now",

"eu preciso trocar de roupa":
"I need to change clothes",

"estamos prontos":
"We are ready"

};

function traduzir(){

let texto =
document.getElementById("portugues")
.value
.toLowerCase()
.trim();

let traducao = dicionario[texto];

if(traducao){

document.getElementById("correcao").value =
traducao;

}else{

document.getElementById("correcao").value =
"Tradução não cadastrada.";

}

}

function adicionar(){

let portugues =
document.getElementById("portugues").value;

let tentativa =
document.getElementById("tentativa").value;

let correcao =
document.getElementById("correcao").value;

let pronuncia =
document.getElementById("pronuncia").value;

let obs =
document.getElementById("obs").value;

let status =
document.getElementById("status").value;

if(portugues.trim() === ""){

alert("Digite a frase em português.");
return;

}

dados.push({
portugues,
tentativa,
correcao,
pronuncia,
obs,
status
});

salvar();
mostrar();

document.getElementById("portugues").value="";
document.getElementById("tentativa").value="";
document.getElementById("correcao").value="";
document.getElementById("pronuncia").value="";
document.getElementById("obs").value="";

}

function mostrar(){

let tabela =
document.getElementById("tabela");

let historico =
document.getElementById("historico");

tabela.innerHTML="";
historico.innerHTML="";

let total = 0;

dados.forEach((item,index)=>{

let pontos =
item.status === "acerto" ? 10 : -5;

total += pontos;

tabela.innerHTML += `

<tr>

<td contenteditable
oninput="editar(${index},'portugues',this.innerText)">
${item.portugues}
</td>

<td contenteditable
oninput="editar(${index},'tentativa',this.innerText)">
${item.tentativa}
</td>

<td contenteditable
oninput="editar(${index},'correcao',this.innerText)">
${item.correcao}
</td>

<td contenteditable
oninput="editar(${index},'pronuncia',this.innerText)">
${item.pronuncia}
</td>

<td>

<select onchange="editar(${index},'status',this.value)">

<option value="acerto"
${item.status==="acerto"?"selected":""}>
✅ Acerto
</option>

<option value="erro"
${item.status==="erro"?"selected":""}>
❌ Erro
</option>

</select>

</td>

<td contenteditable
oninput="editar(${index},'obs',this.innerText)">
${item.obs}
</td>

<td class="${item.status}">
${pontos}
</td>

<td>
<button onclick="apagar(${index})">
Apagar
</button>
</td>

</tr>

`;

historico.innerHTML += `

<div class="historico-item">

<b>🇧🇷</b> ${item.portugues}<br><br>

<b>🇺🇸</b> ${item.correcao}<br><br>

<b>Status:</b>
${item.status==="acerto"
?"✅ Acerto"
:"❌ Erro"}

</div>

`;

});

document.getElementById("pontuacao").innerHTML =
"Pontuação: " + total;

}

function editar(index,campo,valor){

dados[index][campo] = valor;

salvar();

}

function apagar(index){

dados.splice(index,1);

salvar();

mostrar();

}

function salvar(){

localStorage.setItem(
"inglesEdy",
JSON.stringify(dados)
);

}

function limparTudo(){

if(confirm("Deseja apagar tudo?")){

dados = [];

salvar();

mostrar();

}

}

mostrar();

</script>
<hr>
<a href="index04.html"><h2>Próxima Página</h2></a>
</body>
</html>
